<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 音樂顏色控制器</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        .container { position: relative; display: inline-block; }
        #webcam { transform: rotateY(180deg); border: 4px solid #444; border-radius: 10px; }
        #canvas { position: absolute; left: 0; top: 0; transform: rotateY(180deg); }
        .controls { margin-top: 20px; padding: 20px; background: #333; border-radius: 10px; display: inline-block; }
        .status { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .red { color: #ff4d4d; } .yellow { color: #ffdd59; }
    </style>
</head>
<body>

    <h1>AI 顏色音樂控制盒</h1>
    
    <div class="container">
        <video id="webcam" width="640" height="480" autoplay></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>

    <div class="controls">
        <div id="statusText" class="status">等待偵測中...</div>
        <audio id="myAudio" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            您的瀏覽器不支援音訊標籤。
        </audio>
        <p>🔴 紅色：開/關音樂 | 🟡 黃色：上下移動控制音量</p>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('myAudio');
        const statusText = document.getElementById('statusText');

        let isPlaying = false;
        let lastToggleTime = 0;

        // 啟動攝影機
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;
            video.addEventListener('loadeddata', predict);
        });

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = frame.data;
